<!DOCTYPE html>
<html lang="pt-br">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ermos de Varyn</title>
<style>
  body { margin:0; overflow:hidden; background:#111; touch-action:none; }
  canvas { display:block; }

  #ui {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .joystick {
    position: absolute;
    bottom: 80px;
    left: 40px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }

  .stick {
    position: absolute;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    left: 35px;
    top: 35px;
  }

  .btn {
    position: absolute;
    bottom: 100px;
    right: 60px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,0,0,0.4);
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <div class="joystick" id="joy">
    <div class="stick" id="stick"></div>
  </div>
  <div class="btn" id="attack"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE = 64;
const MAP = 60;

// ===== MAPA COM VARIAÇÃO =====
let map = [];
for(let y=0;y<MAP;y++){
  let row=[];
  for(let x=0;x<MAP;x++){
    let r = Math.random();
    if(r < 0.75) row.push("grass");
    else if(r < 0.9) row.push("tree");
    else row.push("stone");
  }
  map.push(row);
}

// ===== PLAYER =====
let player = {
  x: 10,
  y: 10,
  speed: 0.06
};

// ===== JOYSTICK =====
let joy = document.getElementById("joy");
let stick = document.getElementById("stick");

let joyActive = false;
let joyX = 0;
let joyY = 0;

joy.addEventListener("touchstart", e=>{
  joyActive = true;
});

window.addEventListener("touchmove", e=>{
  if(!joyActive) return;

  let t = e.touches[0];
  let rect = joy.getBoundingClientRect();

  let x = t.clientX - (rect.left + rect.width/2);
  let y = t.clientY - (rect.top + rect.height/2);

  let dist = Math.sqrt(x*x+y*y);
  let max = 40;

  if(dist > max){
    x = x/dist * max;
    y = y/dist * max;
  }

  stick.style.left = (35 + x) + "px";
  stick.style.top = (35 + y) + "px";

  joyX = x / max;
  joyY = y / max;
});

window.addEventListener("touchend", ()=>{
  joyActive = false;
  joyX = 0;
  joyY = 0;
  stick.style.left = "35px";
  stick.style.top = "35px";
});

// ===== CAMERA =====
function camera(){
  return {
    x: player.x*TILE - canvas.width/2,
    y: player.y*TILE - canvas.height/2
  }
}

// ===== UPDATE =====
function update(){
  player.x += joyX * player.speed;
  player.y += joyY * player.speed;
}

// ===== DRAW =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let cam = camera();

  for(let y=0;y<MAP;y++){
    for(let x=0;x<MAP;x++){

      let tile = map[y][x];

      let sx = x*TILE - cam.x;
      let sy = y*TILE - cam.y;

      // GRASS VARIADA
      if(tile==="grass"){
        ctx.fillStyle = Math.random() > 0.5 ? "#2e7d32" : "#388e3c";
        ctx.fillRect(sx,sy,TILE,TILE);
      }

      // TREE
      if(tile==="tree"){
        ctx.fillStyle="#2e7d32";
        ctx.fillRect(sx,sy,TILE,TILE);

        ctx.fillStyle="#1b5e20";
        ctx.beginPath();
        ctx.arc(sx+32,sy+32,20,0,Math.PI*2);
        ctx.fill();
      }

      // STONE
      if(tile==="stone"){
        ctx.fillStyle="#6d6d6d";
        ctx.fillRect(sx,sy,TILE,TILE);

        ctx.fillStyle="#aaa";
        ctx.fillRect(sx+10,sy+10,20,20);
      }
    }
  }

  // PLAYER (mais bonito)
  let px = player.x*TILE - cam.x;
  let py = player.y*TILE - cam.y;

  ctx.fillStyle="#ffcc80";
  ctx.beginPath();
  ctx.arc(px+32,py+20,10,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#1565c0";
  ctx.fillRect(px+22,py+30,20,25);
}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
